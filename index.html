<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Absensi Dinas Pendidikan Kota Bandung</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; width: 20px; height: 20px; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-slate-800 antialiased pb-20">

  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none">
    <div id="toastBg" class="px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 min-w-[300px]">
      <i id="toastIcon" data-lucide="info" class="w-5 h-5 text-white"></i>
      <span id="toastMsg" class="text-white text-sm font-medium">Message</span>
    </div>
  </div>

  <div class="bg-blue-600 pb-16 pt-8 px-4 rounded-b-[2rem] shadow-md">
    <div class="max-w-3xl mx-auto flex items-center gap-4">
      <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm shrink-0">
        <i data-lucide="building-2" class="w-6 h-6 text-blue-600"></i>
      </div>
      <div>
        <h1 class="text-lg md:text-xl font-bold text-white leading-tight">
          Halal Bihalal Dinas Pendidikan Kota Bandung
          <br><span class="text-blue-200">15 April 2026</span>
        </h1>
      </div>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-4 -mt-6 relative z-10">
    <div class="bg-white rounded-xl shadow-sm p-1.5 flex gap-1 border border-slate-100">
      <button onclick="switchTab('form')" id="tab-btn-form" class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-blue-50 text-blue-600 transition-colors">Form Absensi</button>
      <button onclick="switchTab('rekap')" id="tab-btn-rekap" class="flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-50 transition-colors">Rekap Data</button>
    </div>
  </div>

  <div id="tab-form" class="max-w-md mx-auto px-4 mt-6">
    <div class="glass-card p-6 rounded-2xl shadow-sm border border-slate-100 space-y-5">
      
      <div class="p-3 bg-slate-50 border border-slate-200 rounded-xl flex items-center gap-3 relative overflow-hidden">
        <div id="gpsIndicator" class="w-3 h-3 rounded-full bg-amber-400 animate-pulse"></div>
        <div class="flex-1">
          <p class="text-[10px] font-bold text-slate-500 uppercase">Status Lokasi</p>
          <p id="gpsText" class="text-xs font-semibold text-slate-700">Mendeteksi koordinat...</p>
        </div>
        <button type="button" onclick="getLocation()" class="p-2 bg-white border border-slate-200 rounded-lg text-blue-600 hover:bg-blue-50">
          <i data-lucide="map-pin" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-700 mb-1">Nama Lengkap</label>
          <input type="text" id="namaInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500" placeholder="Ketik nama Anda...">
        </div>
        
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-slate-700 mb-1">Kategori</label>
            <select id="jenjangSelect" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500">
              <option value="">Pilih...</option>
              <option value="SD">Sekolah Dasar (SD)</option>
              <option value="SMP">Sekolah Menengah (SMP)</option>
              <option value="DINAS">Pegawai Dinas</option>
              <option value="TAMU">Tamu Undangan</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-700 mb-1">Jabatan</label>
            <input type="text" id="jabatanInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500" placeholder="Contoh: Guru">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 mb-1">Asal Instansi / Sekolah</label>
          <input type="text" id="instansiInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500" placeholder="Nama sekolah atau unit kerja...">
        </div>
      </div>

      <div class="border border-slate-200 rounded-xl p-4 bg-slate-50 text-center">
        <label class="block text-xs font-bold text-slate-700 mb-3">Foto Kehadiran (Wajib)</label>
        
        <input type="file" id="cameraInput" accept="image/*" capture="user" class="hidden" onchange="handlePhoto(event)">
        
        <div id="photoPreviewContainer" class="hidden mb-3 relative max-w-[200px] mx-auto rounded-xl overflow-hidden shadow-sm border border-slate-200">
          <img id="photoPreview" class="w-full h-auto" src="" alt="Preview">
          <button onclick="document.getElementById('cameraInput').click()" class="absolute bottom-2 right-2 p-1.5 bg-black/50 backdrop-blur rounded-lg text-white">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
          </button>
        </div>

        <button type="button" id="btnCamera" onclick="document.getElementById('cameraInput').click()" class="w-full py-3 bg-white border-2 border-dashed border-blue-300 text-blue-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-blue-50 transition">
          <i data-lucide="camera" class="w-5 h-5"></i> Ambil Foto Selfie
        </button>
      </div>

      <button type="button" id="submitBtn" onclick="submitForm()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md flex items-center justify-center gap-2 hover:bg-blue-700 transition">
        <i data-lucide="check-circle" class="w-5 h-5" id="btnIcon"></i>
        <span id="btnText">Simpan Kehadiran</span>
        <div id="btnSpinner" class="spinner hidden"></div>
      </button>

      <div id="emergencySection" class="mt-6 pt-5 border-t border-slate-200 text-center hidden">
        <p class="text-[11px] text-slate-500 mb-3 font-medium">Gagal menyimpan atau HP terkendala?</p>
        <a href="https://forms.gle/LINK_GFORM_ANDA_DISINI" target="_blank" class="inline-flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-bold text-red-600 bg-red-50 border border-red-200 rounded-xl w-full hover:bg-red-100 transition">
          <i data-lucide="life-buoy" class="w-4 h-4"></i> Gunakan Absensi Darurat
        </a>
      </div>

    </div>
  </div>

  <div id="tab-rekap" class="max-w-3xl mx-auto px-4 mt-6 hidden">
    <div class="glass-card rounded-2xl p-5 shadow-sm border border-slate-100">
      
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <i data-lucide="list-checks" class="w-5 h-5 text-blue-600"></i>
          <h4 class="text-sm font-bold text-slate-800">Daftar Kehadiran</h4>
        </div>
        <button onclick="loadSemuaData()" class="text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 hover:bg-blue-100 transition">
          <i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh Data
        </button>
      </div>
      
      <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 mb-4 space-y-3">
        <div class="relative">
          <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><i data-lucide="search" class="w-4 h-4"></i></div>
          <input type="text" id="filterPencarian" onkeyup="terapkanFilter()" class="w-full pl-9 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="Cari nama atau instansi...">
        </div>
        <div class="flex items-center gap-2">
          <div class="flex-1">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Dari Jam</p>
            <input type="time" id="filterWaktuMulai" onchange="terapkanFilter()" class="w-full px-2 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="flex-1">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Sampai Jam</p>
            <input type="time" id="filterWaktuAkhir" onchange="terapkanFilter()" class="w-full px-2 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="pt-5">
            <button onclick="resetFilter()" class="p-2 bg-slate-200 text-slate-600 rounded-lg hover:bg-slate-300 transition" title="Reset Filter">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
        <div class="text-right">
          <span id="totalDataTampil" class="text-xs font-bold text-blue-600">Total: 0 data</span>
        </div>
      </div>
      
      <div class="overflow-hidden border border-slate-200 rounded-xl">
        <div class="overflow-x-auto max-h-[500px] custom-scrollbar bg-white">
          <table class="w-full text-left relative">
            <thead class="sticky top-0 z-10">
              <tr class="bg-slate-100 text-slate-500 text-[10px] uppercase tracking-wider shadow-sm">
                <th class="p-3 w-10 text-center">No</th>
                <th class="p-3">Waktu & Nama</th>
                <th class="p-3">Instansi</th>
                <th class="p-3 text-right">Status</th>
              </tr>
            </thead>
            <tbody id="rekapTableBody" class="text-sm divide-y divide-slate-100">
              <tr><td colspan="4" class="p-8 text-center text-slate-400 font-medium">Klik Refresh Data untuk memuat.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Inisialisasi Ikon
    lucide.createIcons();

    // ---------------------------------------------------------
    // 1. CONFIGURASI UTAMA (WAJIB UBAH INI)
    // ---------------------------------------------------------
    const CONFIG = {
      // GANTI DENGAN LINK WEB APP GOOGLE SCRIPT ANDA
      API_URL: 'https://script.google.com/macros/s/AKfycbz_XXXXXXXX/exec', 
      VENUE: {
        lat: -6.914744, // GANTI DENGAN LATITUDE GEDUNG ACARA
        lng: 107.609810, // GANTI DENGAN LONGITUDE GEDUNG ACARA
        radius: 150      // Jarak toleransi dalam meter
      }
    };

    // Variabel Global
    let currentPos = null;
    let compressedFoto = null;
    let semuaDataRekap = [];

    // ---------------------------------------------------------
    // 2. FUNGSI UI & TAB
    // ---------------------------------------------------------
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      const bg = document.getElementById('toastBg');
      const icon = document.getElementById('toastIcon');
      
      document.getElementById('toastMsg').textContent = msg;
      
      if(type === 'success') { bg.className = 'px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 min-w-[300px] bg-emerald-600'; icon.setAttribute('data-lucide', 'check-circle'); }
      else if(type === 'error') { bg.className = 'px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 min-w-[300px] bg-red-600'; icon.setAttribute('data-lucide', 'alert-circle'); }
      else { bg.className = 'px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 min-w-[300px] bg-blue-600'; icon.setAttribute('data-lucide', 'info'); }
      
      lucide.createIcons();
      toast.classList.remove('opacity-0', 'translate-y-[-20px]');
      toast.classList.add('opacity-100', 'translate-y-0');
      
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-20px]');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 3000);
    }

    function switchTab(tab) {
      document.getElementById('tab-form').classList.add('hidden');
      document.getElementById('tab-rekap').classList.add('hidden');
      document.getElementById('tab-btn-form').className = 'flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-50 transition-colors';
      document.getElementById('tab-btn-rekap').className = 'flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-50 transition-colors';

      document.getElementById(`tab-${tab}`).classList.remove('hidden');
      document.getElementById(`tab-btn-${tab}`).className = 'flex-1 py-2.5 text-sm font-bold rounded-lg bg-blue-50 text-blue-600 transition-colors';
      
      if(tab === 'rekap' && semuaDataRekap.length === 0) loadSemuaData();
    }

    // ---------------------------------------------------------
    // 3. FUNGSI GPS & JARAK
    // ---------------------------------------------------------
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; // Radius bumi dalam meter
      const p1 = lat1 * Math.PI/180;
      const p2 = lat2 * Math.PI/180;
      const dp = (lat2-lat1) * Math.PI/180;
      const dl = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function getLocation() {
      const ind = document.getElementById('gpsIndicator');
      const txt = document.getElementById('gpsText');
      ind.className = 'w-3 h-3 rounded-full bg-amber-400 animate-pulse';
      txt.textContent = 'Mencari sinyal GPS...';

      if (!navigator.geolocation) {
        txt.textContent = 'GPS tidak didukung di HP ini';
        ind.className = 'w-3 h-3 rounded-full bg-red-500';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          const jarak = calculateDistance(currentPos.lat, currentPos.lng, CONFIG.VENUE.lat, CONFIG.VENUE.lng);
          
          txt.innerHTML = `Terdeteksi (Jarak: <b>${Math.round(jarak)}m</b>)`;
          
          if(jarak <= CONFIG.VENUE.radius) {
            ind.className = 'w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]';
            // Tampilkan Pintu Darurat jika masuk radius
            document.getElementById('emergencySection').classList.remove('hidden');
          } else {
            ind.className = 'w-3 h-3 rounded-full bg-red-500';
            // Sembunyikan Pintu Darurat jika di luar area
            document.getElementById('emergencySection').classList.add('hidden');
          }
        },
        (err) => {
          txt.textContent = 'Akses lokasi ditolak/gagal';
          ind.className = 'w-3 h-3 rounded-full bg-red-500';
          showToast('Mohon izinkan akses lokasi (GPS) di browser Anda', 'error');
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    // ---------------------------------------------------------
    // 4. FUNGSI KAMERA (KOMPRESI)
    // ---------------------------------------------------------
    function handlePhoto(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 600; // Kompresi agar ringan
          const scaleSize = MAX_WIDTH / img.width;
          canvas.width = MAX_WIDTH;
          canvas.height = img.height * scaleSize;

          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          
          compressedFoto = canvas.toDataURL('image/jpeg', 0.6); // Quality 60%
          
          document.getElementById('photoPreview').src = compressedFoto;
          document.getElementById('photoPreviewContainer').classList.remove('hidden');
          document.getElementById('btnCamera').classList.add('hidden');
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ---------------------------------------------------------
    // 5. FUNGSI SUBMIT FORM
    // ---------------------------------------------------------
    async function submitForm() {
      const nama = document.getElementById('namaInput').value.trim();
      const jenjang = document.getElementById('jenjangSelect').value;
      const jabatan = document.getElementById('jabatanInput').value.trim();
      const instansi = document.getElementById('instansiInput').value.trim();
      
      // Validasi Dasar
      if (!nama || !jenjang || !jabatan || !instansi) {
        return showToast('Mohon lengkapi semua isian teks', 'error');
      }

      // Validasi Foto (Wajib)
      if (!compressedFoto) {
        return showToast('Harap ambil foto selfie terlebih dahulu!', 'error');
      }

      // Logika GPS (Tidak Memblokir, Hanya Mencatat)
      let jarak = 0;
      let statusLokasi = 'TIDAK TERDETEKSI';

      if (currentPos) {
        jarak = calculateDistance(currentPos.lat, currentPos.lng, CONFIG.VENUE.lat, CONFIG.VENUE.lng);
        statusLokasi = (jarak <= CONFIG.VENUE.radius) ? 'VALID' : 'TIDAK VALID';
      } else {
        statusLokasi = 'TIDAK VALID (GPS OFF)';
      }

      // Animasi Loading
      const btn = document.getElementById('submitBtn'), txt = document.getElementById('btnText'), icn = document.getElementById('btnIcon'), spn = document.getElementById('btnSpinner');
      btn.disabled = true; txt.textContent = 'Menyimpan Data...'; icn.classList.add('hidden'); spn.classList.remove('hidden');

      const payload = {
        action: 'submit',
        nama: nama,
        jenjang: jenjang,
        jabatan: jabatan,
        nama_sekolah: instansi, // di-map ke nama sekolah/unit
        jarak: Math.round(jarak),
        status_lokasi: statusLokasi,
        foto_base64: compressedFoto
      };

      try {
        const res = await fetch(CONFIG.API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const result = await res.json();

        if(result.success) {
          showToast('Data berhasil disimpan!', 'success');
          // Reset Form
          document.getElementById('namaInput').value = '';
          document.getElementById('jabatanInput').value = '';
          document.getElementById('instansiInput').value = '';
          compressedFoto = null;
          document.getElementById('photoPreviewContainer').classList.add('hidden');
          document.getElementById('btnCamera').classList.remove('hidden');
          
          // Refresh Rekap & Pindah Tab
          loadSemuaData();
          setTimeout(() => switchTab('rekap'), 1500);
        } else {
          showToast(result.message || 'Gagal menyimpan', 'error');
        }
      } catch(e) {
        showToast('Koneksi terputus/Server sibuk. Silakan klik simpan lagi.', 'error');
      } finally {
        btn.disabled = false; txt.textContent = 'Simpan Kehadiran'; icn.classList.remove('hidden'); spn.classList.add('hidden');
      }
    }

    // ---------------------------------------------------------
    // 6. FUNGSI REKAP & FILTER
    // ---------------------------------------------------------
    async function loadSemuaData() {
      const tbody = document.getElementById('rekapTableBody');
      tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center"><div class="spinner border-slate-300 border-t-blue-600 mx-auto mb-3"></div><p class="text-slate-500 font-medium text-sm">Menarik data dari server...</p></td></tr>';
      
      try {
        const res = await fetch(`${CONFIG.API_URL}?action=recent`);
        const data = await res.json();
        
        if (data && data.length > 0) {
          semuaDataRekap = data;
          terapkanFilter();
        } else {
          semuaDataRekap = [];
          tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500 font-medium">Belum ada data absensi.</td></tr>';
          document.getElementById('totalDataTampil').textContent = 'Total: 0 data';
        }
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500 font-medium">Gagal memuat rekap. Periksa koneksi internet.</td></tr>';
      }
    }

    function terapkanFilter() {
      const teksCari = document.getElementById('filterPencarian').value.toLowerCase();
      const waktuMulai = document.getElementById('filterWaktuMulai').value;
      const waktuAkhir = document.getElementById('filterWaktuAkhir').value;
      
      const dataTersaring = semuaDataRekap.filter(item => {
        const nama = (item.nama || '').toLowerCase();
        const instansi = (item.nama_sekolah || '').toLowerCase();
        const cocokTeks = nama.includes(teksCari) || instansi.includes(teksCari);
        
        let cocokWaktu = true;
        if (waktuMulai || waktuAkhir) {
          const jamData = new Date(item.timestamp).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
          if (waktuMulai && jamData < waktuMulai) cocokWaktu = false;
          if (waktuAkhir && jamData > waktuAkhir) cocokWaktu = false;
        }
        
        return cocokTeks && cocokWaktu;
      });
      
      renderTabel(dataTersaring);
    }

    function resetFilter() {
      document.getElementById('filterPencarian').value = '';
      document.getElementById('filterWaktuMulai').value = '';
      document.getElementById('filterWaktuAkhir').value = '';
      terapkanFilter();
    }

    function renderTabel(data) {
      const tbody = document.getElementById('rekapTableBody');
      document.getElementById('totalDataTampil').textContent = `Total: ${data.length} data`;
      
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500 font-medium">Data tidak ditemukan.</td></tr>';
        return;
      }

      // Auto Sort: Terbaru di atas
      data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      tbody.innerHTML = '';
      const fragment = document.createDocumentFragment();
      
      data.forEach((item, index) => {
        const timeStr = new Date(item.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        
        // Logika Warna Status Lokasi
        const isVal = item.status_lokasi === 'VALID';
        const statusClass = isVal 
          ? "bg-emerald-100 text-emerald-700 border-emerald-200" 
          : "bg-red-100 text-red-700 border-red-200";

        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition-colors border-b border-slate-100";
        tr.innerHTML = `
          <td class="p-3 text-xs text-slate-400 font-bold text-center align-top">${index + 1}</td>
          <td class="p-3 align-top">
            <div class="flex flex-col">
              <span class="text-[10px] font-bold text-blue-600 mb-0.5">${timeStr} WIB</span>
              <span class="font-bold text-slate-800 leading-tight">${item.nama}</span>
              <span class="text-[10px] text-slate-500 uppercase mt-0.5">${item.jabatan || '-'}</span>
            </div>
          </td>
          <td class="p-3 align-top">
            <p class="text-xs text-slate-700 font-medium leading-tight">${item.nama_sekolah || '-'}</p>
            <span class="inline-block mt-1 text-[9px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-bold">${item.jenjang || '-'}</span>
          </td>
          <td class="p-3 text-right align-top">
            <span class="inline-block px-2 py-1 rounded border text-[9px] font-black ${statusClass}">
              ${item.status_lokasi || 'TIDAK VALID'}
            </span>
          </td>
        `;
        fragment.appendChild(tr);
      });
      
      tbody.appendChild(fragment);
    }

    // Jalankan saat web pertama kali dibuka
    window.onload = () => {
      getLocation(); // Otomatis cari GPS
    };
  </script>
</body>
</html>
